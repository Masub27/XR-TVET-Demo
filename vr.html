<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Workshop for TVET</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .topbar {
      padding: 14px 18px;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      text-align: center;
      color: #1f2937;
      font-weight: bold;
    }

    .note {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      z-index: 9999;
      font-size: 14px;
      color: #111827;
    }
  </style>
</head>
<body>

<div class="topbar">
  VR Workshop for TVET — Click stations and test the electronic device
</div>

<div class="note">
  Click the blue electrical panel, purple AI desk, orange safety corner, or the electronic device switch.
</div>

<a-scene
  embedded
  style="height: calc(100vh - 52px); width: 100%;"
  renderer="antialias: true; colorManagement: true"
  cursor="rayOrigin: mouse">

  <!-- Lights -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 0.9" position="2 4 2"></a-entity>

  <!-- Room -->
  <a-plane position="0 0 -4" rotation="-90 0 0" width="14" height="14" color="#e5e7eb"></a-plane>
  <a-plane position="0 2 -8" width="14" height="4" color="#eef2ff"></a-plane>
  <a-plane position="-7 2 -4" rotation="0 90 0" width="8" height="4" color="#f8fafc"></a-plane>
  <a-plane position="7 2 -4" rotation="0 -90 0" width="8" height="4" color="#f8fafc"></a-plane>
  <a-plane position="0 4 -4" rotation="90 0 0" width="14" height="14" color="#ffffff"></a-plane>

  <!-- Electrical Station -->
  <a-box
    id="stationElectrical"
    position="-4 1.2 -5.5"
    width="1.8"
    height="2.2"
    depth="0.15"
    color="#93c5fd"
    class="clickable">
  </a-box>

  <a-box position="-4.45 1.4 -5.38" width="0.22" height="0.22" depth="0.04" color="#0f172a"></a-box>
  <a-box position="-4 1.4 -5.38" width="0.22" height="0.22" depth="0.04" color="#eab308"></a-box>
  <a-box position="-3.55 1.4 -5.38" width="0.22" height="0.22" depth="0.04" color="#ef4444"></a-box>
  <a-box position="-4.45 0.85 -5.38" width="0.22" height="0.22" depth="0.04" color="#22c55e"></a-box>
  <a-box position="-4 0.85 -5.38" width="0.22" height="0.22" depth="0.04" color="#38bdf8"></a-box>
  <a-box position="-3.55 0.85 -5.38" width="0.22" height="0.22" depth="0.04" color="#f97316"></a-box>

  <a-text
    value="Electrical Station"
    position="-4 2.7 -5.3"
    align="center"
    color="#111827"
    width="6">
  </a-text>

  <!-- AI Tutor Desk -->
  <a-box
    id="stationAI"
    position="0 0.55 -5"
    width="2.2"
    height="0.15"
    depth="1.1"
    color="#8b5cf6"
    class="clickable">
  </a-box>

  <a-box position="-0.9 0.25 -5.35" width="0.12" height="0.5" depth="0.12" color="#4c1d95"></a-box>
  <a-box position="0.9 0.25 -5.35" width="0.12" height="0.5" depth="0.12" color="#4c1d95"></a-box>
  <a-box position="-0.9 0.25 -4.65" width="0.12" height="0.5" depth="0.12" color="#4c1d95"></a-box>
  <a-box position="0.9 0.25 -4.65" width="0.12" height="0.5" depth="0.12" color="#4c1d95"></a-box>
  <a-box position="0 1.05 -5" width="1.2" height="0.7" depth="0.08" color="#111827"></a-box>
  <a-plane position="0 1.05 -4.95" width="1.05" height="0.55" color="#22d3ee"></a-plane>
  <a-cylinder position="0 0.72 -4.55" radius="0.08" height="0.05" color="#374151"></a-cylinder>

  <a-text
    value="AI Tutor Desk"
    position="0 2.2 -5"
    align="center"
    color="#111827"
    width="6">
  </a-text>

  <!-- Safety Corner -->
  <a-cone
    id="stationSafety"
    position="4 0.6 -5.2"
    radius-bottom="0.45"
    radius-top="0.05"
    height="1.2"
    color="#f59e0b"
    class="clickable">
  </a-cone>

  <a-box position="4 1.45 -5.2" width="0.6" height="0.2" depth="0.1" color="#111827"></a-box>
  <a-box position="4 0.1 -5.2" width="1.3" height="0.08" depth="1.3" color="#fcd34d"></a-box>
  <a-ring position="4 1.7 -5.12" radius-inner="0.18" radius-outer="0.28" color="#ef4444"></a-ring>

  <a-text
    value="Safety Corner"
    position="4 2.4 -5.1"
    align="center"
    color="#111827"
    width="6">
  </a-text>

  <!-- Electronic Equipment Demo -->
  <a-box
    id="deviceBody"
    position="0 1 -3.2"
    width="1.4"
    height="0.8"
    depth="0.8"
    color="#475569"
    class="clickable">
  </a-box>

  <!-- Indicator -->
  <a-sphere
    id="indicatorLight"
    position="-0.35 1.15 -2.77"
    radius="0.08"
    color="#ef4444">
  </a-sphere>

  <!-- Power Switch -->
  <a-box
    id="powerSwitch"
    position="0 1.05 -2.77"
    width="0.18"
    height="0.1"
    depth="0.05"
    color="#111827"
    class="clickable">
  </a-box>

  <!-- Fan Center -->
  <a-cylinder
    position="0.35 1.05 -2.77"
    radius="0.08"
    height="0.03"
    rotation="90 0 0"
    color="#111827">
  </a-cylinder>

  <!-- Fan Blades -->
  <a-entity id="fanBlades" position="0.35 1.05 -2.76">
    <a-box position="0 0 0" width="0.45" height="0.03" depth="0.02" color="#cbd5e1"></a-box>
    <a-box position="0 0 0" width="0.03" height="0.45" depth="0.02" color="#cbd5e1"></a-box>
  </a-entity>

  <a-text
    id="deviceStatus"
    value="Device: OFF"
    position="0 1.75 -3.2"
    align="center"
    color="#111827"
    width="5">
  </a-text>

  <a-text
    value="Interactive Electronic Device"
    position="0 0.35 -3.2"
    align="center"
    color="#2563eb"
    width="6">
  </a-text>

  <!-- Extra room objects -->
  <a-box position="-5.8 0.5 -2.8" width="0.8" height="1" depth="0.8" color="#64748b"></a-box>
  <a-box position="5.6 0.35 -3" width="1.1" height="0.7" depth="1.1" color="#94a3b8"></a-box>
  <a-cylinder position="2.2 0.6 -3.3" radius="0.35" height="1.2" color="#10b981"></a-cylinder>

  <!-- Camera -->
  <a-entity id="rig" position="0 1.6 2">
    <a-camera wasd-controls="acceleration: 20" look-controls="pointerLockEnabled: false">
      <a-cursor color="#2563eb"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#dbeafe"></a-sky>
</a-scene>

<script>
  const rig = document.querySelector('#rig');

  document.querySelector('#stationElectrical').addEventListener('click', () => {
    rig.setAttribute('position', '-4 1.6 -2.9');
  });

  document.querySelector('#stationAI').addEventListener('click', () => {
    rig.setAttribute('position', '0 1.6 -2.7');
  });

  document.querySelector('#stationSafety').addEventListener('click', () => {
    rig.setAttribute('position', '4 1.6 -2.9');
  });

  let deviceOn = false;
  let fanInterval = null;
  let fanRotation = 0;

  const indicatorLight = document.querySelector('#indicatorLight');
  const powerSwitch = document.querySelector('#powerSwitch');
  const fanBlades = document.querySelector('#fanBlades');
  const deviceStatus = document.querySelector('#deviceStatus');
  const deviceBody = document.querySelector('#deviceBody');

  function startFan() {
    if (fanInterval) return;
    fanInterval = setInterval(() => {
      fanRotation += 15;
      fanBlades.setAttribute('rotation', `0 0 ${fanRotation}`);
    }, 50);
  }

  function stopFan() {
    clearInterval(fanInterval);
    fanInterval = null;
  }

  function toggleDevice() {
    deviceOn = !deviceOn;

    if (deviceOn) {
      indicatorLight.setAttribute('color', '#22c55e');
      powerSwitch.setAttribute('rotation', '0 0 -20');
      deviceStatus.setAttribute('value', 'Device: ON');
      deviceBody.setAttribute('color', '#64748b');
      startFan();
    } else {
      indicatorLight.setAttribute('color', '#ef4444');
      powerSwitch.setAttribute('rotation', '0 0 0');
      deviceStatus.setAttribute('value', 'Device: OFF');
      deviceBody.setAttribute('color', '#475569');
      stopFan();
    }
  }

  deviceBody.addEventListener('click', toggleDevice);
  powerSwitch.addEventListener('click', toggleDevice);
</script>

</body>
</html>
