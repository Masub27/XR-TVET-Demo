<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium VR Workshop for TVET</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }
    .topbar {
      padding: 14px 18px;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      text-align: center;
      color: #1f2937;
      font-weight: bold;
    }
    .note {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.96);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      z-index: 9999;
      font-size: 14px;
      color: #111827;
      text-align: center;
      max-width: 760px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div class="topbar">
  Premium VR Workshop for TVET
</div>

<div class="note">
  Click the large front buttons: START, FAULT, RESET, or E-STOP.
</div>

<a-scene
  embedded
  style="height: calc(100vh - 52px); width: 100%;"
  renderer="antialias: true; colorManagement: true"
  cursor="rayOrigin: mouse">

  <!-- Lights -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 0.95" position="2 4 2"></a-entity>

  <!-- Room -->
  <a-plane position="0 0 -4" rotation="-90 0 0" width="18" height="18" color="#e5e7eb"></a-plane>
  <a-plane position="0 2 -10" width="18" height="4" color="#eef2ff"></a-plane>
  <a-plane position="-9 2 -4" rotation="0 90 0" width="12" height="4" color="#f8fafc"></a-plane>
  <a-plane position="9 2 -4" rotation="0 -90 0" width="12" height="4" color="#f8fafc"></a-plane>
  <a-plane position="0 4 -4" rotation="90 0 0" width="18" height="18" color="#ffffff"></a-plane>

  <!-- Stations -->
  <a-box id="stationElectrical" position="-6 1.2 -7" width="1.8" height="2.2" depth="0.15" color="#93c5fd" class="clickable"></a-box>
  <a-text value="Electrical Station" position="-6 2.9 -6.8" align="center" color="#111827" width="7"></a-text>

  <a-box id="stationAI" position="0 0.6 -7" width="2.4" height="0.18" depth="1.2" color="#8b5cf6" class="clickable"></a-box>
  <a-box position="0 1.1 -7" width="1.2" height="0.7" depth="0.08" color="#111827"></a-box>
  <a-plane position="0 1.1 -6.94" width="1.05" height="0.55" color="#22d3ee"></a-plane>
  <a-text value="AI Tutor Desk" position="0 2.35 -6.8" align="center" color="#111827" width="7"></a-text>

  <a-cone id="stationSafety" position="6 0.65 -7" radius-bottom="0.45" radius-top="0.05" height="1.2" color="#f59e0b" class="clickable"></a-cone>
  <a-ring position="6 1.8 -6.92" radius-inner="0.18" radius-outer="0.28" color="#ef4444"></a-ring>
  <a-text value="Safety Corner" position="6 2.5 -6.8" align="center" color="#111827" width="7"></a-text>

  <!-- Main machine -->
  <a-box id="machineBody" position="0 1.05 -3.8" width="2.7" height="1.2" depth="1.2" color="#2563eb"></a-box>

  <!-- Top indicator lights -->
  <a-sphere id="powerLight" position="-0.9 1.45 -3.15" radius="0.10" color="#ef4444"></a-sphere>
  <a-sphere id="warningLight" position="-0.5 1.45 -3.15" radius="0.10" color="#7f1d1d"></a-sphere>
  <a-sphere id="faultLight" position="-0.1 1.45 -3.15" radius="0.10" color="#4b5563"></a-sphere>

  <!-- Fan -->
  <a-cylinder position="0.95 1.32 -3.15" radius="0.15" height="0.06" rotation="90 0 0" color="#111827"></a-cylinder>
  <a-entity id="fanBlades" position="0.95 1.32 -3.11">
    <a-box width="0.62" height="0.03" depth="0.02" color="#cbd5e1"></a-box>
    <a-box width="0.03" height="0.62" depth="0.02" color="#cbd5e1"></a-box>
  </a-entity>

  <!-- Machine texts -->
  <a-text id="machineStatus" value="Machine: OFF" position="0 2.25 -3.75" align="center" color="#111827" width="7"></a-text>
  <a-text id="faultStatus" value="Fault: None" position="0 1.95 -3.75" align="center" color="#7c3aed" width="7"></a-text>
  <a-text id="scoreText" value="Score: 0" position="0 1.65 -3.75" align="center" color="#059669" width="6"></a-text>
  <a-text value="Interactive Control Machine" position="0 0.25 -3.75" align="center" color="#2563eb" width="8"></a-text>

  <!-- FRONT BUTTON PANEL -->
  <a-box position="0 0.45 -2.7" width="3.8" height="0.45" depth="0.4" color="#dbeafe"></a-box>

  <a-box id="startBtn" position="-1.2 0.58 -2.45" width="0.6" height="0.18" depth="0.18" color="#22c55e" class="clickable"></a-box>
  <a-box id="faultBtn" position="-0.4 0.58 -2.45" width="0.6" height="0.18" depth="0.18" color="#f59e0b" class="clickable"></a-box>
  <a-box id="resetBtn" position="0.4 0.58 -2.45" width="0.6" height="0.18" depth="0.18" color="#38bdf8" class="clickable"></a-box>
  <a-box id="stopBtn" position="1.2 0.58 -2.45" width="0.7" height="0.22" depth="0.2" color="#ef4444" class="clickable"></a-box>

  <a-text value="START" position="-1.2 0.57 -2.34" align="center" color="#111827" width="3.2"></a-text>
  <a-text value="FAULT" position="-0.4 0.57 -2.34" align="center" color="#111827" width="3.2"></a-text>
  <a-text value="RESET" position="0.4 0.57 -2.34" align="center" color="#111827" width="3.2"></a-text>
  <a-text value="E-STOP" position="1.2 0.57 -2.34" align="center" color="#111827" width="3.8"></a-text>

  <!-- Conveyor -->
  <a-box position="-3.8 0.35 -4.1" width="3.1" height="0.22" depth="1.05" color="#64748b"></a-box>
  <a-cylinder position="-5.15 0.35 -4.1" radius="0.19" height="1.05" rotation="90 0 0" color="#334155"></a-cylinder>
  <a-cylinder position="-2.45 0.35 -4.1" radius="0.19" height="1.05" rotation="90 0 0" color="#334155"></a-cylinder>
  <a-box id="item1" position="-4.9 0.6 -3.85" width="0.24" height="0.24" depth="0.24" color="#f97316"></a-box>
  <a-box id="item2" position="-4.2 0.6 -4.1" width="0.24" height="0.24" depth="0.24" color="#22c55e"></a-box>
  <a-box id="item3" position="-3.5 0.6 -4.35" width="0.24" height="0.24" depth="0.24" color="#eab308"></a-box>
  <a-text value="Conveyor Demo" position="-3.8 1.2 -4.1" align="center" color="#111827" width="5.5"></a-text>

  <!-- Press unit -->
  <a-box position="4 0.25 -4.1" width="1.7" height="0.52" depth="1.2" color="#94a3b8"></a-box>
  <a-cylinder position="4 2.05 -4.1" radius="0.14" height="1.85" color="#6b7280"></a-cylinder>
  <a-box id="pistonHead" position="4 1.25 -4.1" width="0.72" height="0.28" depth="0.72" color="#111827"></a-box>
  <a-text value="Press Unit" position="4 2.45 -4.1" align="center" color="#111827" width="5.5"></a-text>

  <!-- Camera -->
  <a-entity id="rig" position="0 1.6 2.8">
    <a-camera wasd-controls="acceleration: 20" look-controls="pointerLockEnabled: false">
      <a-cursor color="#2563eb"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#dbeafe"></a-sky>
</a-scene>

<script>
  const rig = document.querySelector('#rig');

  document.querySelector('#stationElectrical').addEventListener('click', () => {
    rig.setAttribute('position', '-6 1.6 -4.3');
  });

  document.querySelector('#stationAI').addEventListener('click', () => {
    rig.setAttribute('position', '0 1.6 -4.1');
  });

  document.querySelector('#stationSafety').addEventListener('click', () => {
    rig.setAttribute('position', '6 1.6 -4.3');
  });

  let machineOn = false;
  let faultMode = false;
  let emergencyStopped = false;
  let score = 0;

  let fanInterval = null;
  let fanRotation = 0;
  let blinkInterval = null;
  let blinkState = false;
  let conveyorInterval = null;
  let pistonInterval = null;
  let pistonDirection = -1;
  let pistonY = 1.25;

  const machineBody = document.querySelector('#machineBody');
  const powerLight = document.querySelector('#powerLight');
  const warningLight = document.querySelector('#warningLight');
  const faultLight = document.querySelector('#faultLight');
  const fanBlades = document.querySelector('#fanBlades');

  const machineStatus = document.querySelector('#machineStatus');
  const faultStatus = document.querySelector('#faultStatus');
  const scoreText = document.querySelector('#scoreText');

  const startBtn = document.querySelector('#startBtn');
  const faultBtn = document.querySelector('#faultBtn');
  const resetBtn = document.querySelector('#resetBtn');
  const stopBtn = document.querySelector('#stopBtn');

  const item1 = document.querySelector('#item1');
  const item2 = document.querySelector('#item2');
  const item3 = document.querySelector('#item3');
  const pistonHead = document.querySelector('#pistonHead');

  let itemPositions = [
    { x: -4.9, z: -3.85, el: item1 },
    { x: -4.2, z: -4.1, el: item2 },
    { x: -3.5, z: -4.35, el: item3 }
  ];

  function updateScore(points) {
    score += points;
    scoreText.setAttribute('value', `Score: ${score}`);
  }

  function startFan() {
    if (fanInterval) return;
    fanInterval = setInterval(() => {
      fanRotation += faultMode ? 8 : 18;
      fanBlades.setAttribute('rotation', `0 0 ${fanRotation}`);
    }, 40);
  }

  function stopFan() {
    clearInterval(fanInterval);
    fanInterval = null;
  }

  function startBlinking() {
    if (blinkInterval) return;
    blinkInterval = setInterval(() => {
      blinkState = !blinkState;
      warningLight.setAttribute('color', blinkState ? (faultMode ? '#ef4444' : '#facc15') : '#7f1d1d');
    }, faultMode ? 220 : 350);
  }

  function stopBlinking() {
    clearInterval(blinkInterval);
    blinkInterval = null;
    blinkState = false;
    warningLight.setAttribute('color', '#7f1d1d');
  }

  function startConveyor() {
    if (conveyorInterval) return;
    conveyorInterval = setInterval(() => {
      itemPositions.forEach(obj => {
        obj.x += faultMode ? 0.015 : 0.04;
        if (obj.x > -2.5) obj.x = -5.0;
        obj.el.setAttribute('position', `${obj.x} 0.6 ${obj.z}`);
      });
    }, 80);
  }

  function stopConveyor() {
    clearInterval(conveyorInterval);
    conveyorInterval = null;
  }

  function startPiston() {
    if (pistonInterval) return;
    pistonInterval = setInterval(() => {
      const step = faultMode ? 0.015 : 0.03;
      pistonY += pistonDirection * step;
      if (pistonY <= 0.85) pistonDirection = 1;
      if (pistonY >= 1.25) pistonDirection = -1;
      pistonHead.setAttribute('position', `4 ${pistonY} -4.1`);
    }, 60);
  }

  function stopPiston() {
    clearInterval(pistonInterval);
    pistonInterval = null;
    pistonY = 1.25;
    pistonDirection = -1;
    pistonHead.setAttribute('position', '4 1.25 -4.1');
  }

  function applyNormalMode() {
    machineBody.setAttribute('color', '#3b82f6');
    powerLight.setAttribute('color', '#22c55e');
    faultLight.setAttribute('color', '#4b5563');
    machineStatus.setAttribute('value', 'Machine: RUNNING');
    faultStatus.setAttribute('value', 'Fault: None');
  }

  function applyFaultMode() {
    machineBody.setAttribute('color', '#f59e0b');
    powerLight.setAttribute('color', '#22c55e');
    faultLight.setAttribute('color', '#ef4444');
    machineStatus.setAttribute('value', 'Machine: RUNNING (DEGRADED)');
    faultStatus.setAttribute('value', 'Fault: Simulated issue');
  }

  function turnMachineOn() {
    if (emergencyStopped) return;
    machineOn = true;
    if (faultMode) {
      applyFaultMode();
    } else {
      applyNormalMode();
    }
    stopBlinking();
    startBlinking();
    startFan();
    startConveyor();
    startPiston();
  }

  function turnMachineOff() {
    machineOn = false;
    machineBody.setAttribute('color', '#2563eb');
    powerLight.setAttribute('color', '#ef4444');
    machineStatus.setAttribute('value', 'Machine: OFF');
    if (!faultMode) {
      faultStatus.setAttribute('value', 'Fault: None');
      faultLight.setAttribute('color', '#4b5563');
    }
    stopFan();
    stopBlinking();
    stopConveyor();
    stopPiston();
  }

  function emergencyStop() {
    emergencyStopped = true;
    machineOn = false;
    stopFan();
    stopBlinking();
    stopConveyor();
    stopPiston();
    powerLight.setAttribute('color', '#ef4444');
    warningLight.setAttribute('color', '#ef4444');
    faultLight.setAttribute('color', '#ef4444');
    machineBody.setAttribute('color', '#991b1b');
    machineStatus.setAttribute('value', 'Machine: EMERGENCY STOP');
    faultStatus.setAttribute('value', 'Fault: Emergency stop activated');
    updateScore(1);
  }

  function triggerFault() {
    faultMode = true;
    faultLight.setAttribute('color', '#ef4444');
    faultStatus.setAttribute('value', 'Fault: Simulated issue');
    if (machineOn) {
      applyFaultMode();
      stopBlinking();
      startBlinking();
    }
    updateScore(1);
  }

  function resetSystem() {
    emergencyStopped = false;
    faultMode = false;
    turnMachineOff();
    warningLight.setAttribute('color', '#7f1d1d');
    faultLight.setAttribute('color', '#4b5563');
    machineBody.setAttribute('color', '#2563eb');
    machineStatus.setAttribute('value', 'Machine: OFF');
    faultStatus.setAttribute('value', 'Fault: None');
    updateScore(1);
  }

  startBtn.addEventListener('click', () => {
    if (!machineOn && !emergencyStopped) {
      turnMachineOn();
      updateScore(1);
    }
  });

  faultBtn.addEventListener('click', () => {
    triggerFault();
  });

  resetBtn.addEventListener('click', () => {
    resetSystem();
  });

  stopBtn.addEventListener('click', () => {
    emergencyStop();
  });
</script>

</body>
</html>
