<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium VR Workshop for TVET</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .topbar {
      padding: 14px 18px;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      text-align: center;
      color: #1f2937;
      font-weight: bold;
    }

    .note {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.96);
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      z-index: 9999;
      font-size: 14px;
      color: #111827;
      text-align: center;
      max-width: 760px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div class="topbar">
  Premium VR Workshop for TVET — Interactive Machine, Fault Mode, Emergency Stop, and Score
</div>

<div class="note">
  Click the machine buttons: <b>START</b>, <b>FAULT</b>, <b>RESET</b>, and <b>E-STOP</b>.<br>
  Explore the room and show the system behavior for training and safety demonstration.
</div>

<a-scene
  embedded
  style="height: calc(100vh - 52px); width: 100%;"
  renderer="antialias: true; colorManagement: true"
  cursor="rayOrigin: mouse">

  <!-- Lights -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 0.95" position="2 4 2"></a-entity>

  <!-- Room -->
  <a-plane position="0 0 -4" rotation="-90 0 0" width="18" height="18" color="#e5e7eb"></a-plane>
  <a-plane position="0 2 -10" width="18" height="4" color="#eef2ff"></a-plane>
  <a-plane position="-9 2 -4" rotation="0 90 0" width="12" height="4" color="#f8fafc"></a-plane>
  <a-plane position="9 2 -4" rotation="0 -90 0" width="12" height="4" color="#f8fafc"></a-plane>
  <a-plane position="0 4 -4" rotation="90 0 0" width="18" height="18" color="#ffffff"></a-plane>

  <!-- Station Panels -->
  <a-box id="stationElectrical" position="-6 1.2 -6.8" width="1.8" height="2.2" depth="0.15" color="#93c5fd" class="clickable"></a-box>
  <a-text value="Electrical Station" position="-6 2.7 -6.6" align="center" color="#111827" width="6"></a-text>

  <a-box id="stationAI" position="0 0.55 -6.6" width="2.5" height="0.15" depth="1.2" color="#8b5cf6" class="clickable"></a-box>
  <a-box position="0 1.05 -6.6" width="1.2" height="0.7" depth="0.08" color="#111827"></a-box>
  <a-plane position="0 1.05 -6.54" width="1.05" height="0.55" color="#22d3ee"></a-plane>
  <a-text value="AI Tutor Desk" position="0 2.2 -6.6" align="center" color="#111827" width="6"></a-text>

  <a-cone id="stationSafety" position="6 0.6 -6.8" radius-bottom="0.45" radius-top="0.05" height="1.2" color="#f59e0b" class="clickable"></a-cone>
  <a-ring position="6 1.7 -6.72" radius-inner="0.18" radius-outer="0.28" color="#ef4444"></a-ring>
  <a-text value="Safety Corner" position="6 2.4 -6.6" align="center" color="#111827" width="6"></a-text>

  <!-- Main Machine Body -->
  <a-box id="machineBody" position="0 1 -3.4" width="2.4" height="1.1" depth="1.1" color="#2563eb"></a-box>

  <!-- Lights -->
  <a-sphere id="powerLight" position="-0.85 1.25 -2.82" radius="0.09" color="#ef4444"></a-sphere>
  <a-sphere id="warningLight" position="-0.45 1.25 -2.82" radius="0.09" color="#7f1d1d"></a-sphere>
  <a-sphere id="faultLight" position="-0.05 1.25 -2.82" radius="0.09" color="#4b5563"></a-sphere>

  <!-- Fan -->
  <a-cylinder position="0.85 1.13 -2.82" radius="0.13" height="0.06" rotation="90 0 0" color="#111827"></a-cylinder>
  <a-entity id="fanBlades" position="0.85 1.13 -2.79">
    <a-box position="0 0 0" width="0.56" height="0.03" depth="0.02" color="#cbd5e1"></a-box>
    <a-box position="0 0 0" width="0.03" height="0.56" depth="0.02" color="#cbd5e1"></a-box>
  </a-entity>

  <!-- Buttons -->
  <a-cylinder id="startBtn" position="-0.6 0.7 -2.8" radius="0.14" height="0.08" color="#22c55e" class="clickable"></a-cylinder>
  <a-cylinder id="faultBtn" position="-0.15 0.7 -2.8" radius="0.14" height="0.08" color="#f59e0b" class="clickable"></a-cylinder>
  <a-cylinder id="resetBtn" position="0.3 0.7 -2.8" radius="0.14" height="0.08" color="#38bdf8" class="clickable"></a-cylinder>
  <a-cylinder id="stopBtn" position="0.75 0.7 -2.8" radius="0.17" height="0.1" color="#ef4444" class="clickable"></a-cylinder>

  <a-text value="START" position="-0.6 0.47 -2.75" align="center" color="#111827" width="3"></a-text>
  <a-text value="FAULT" position="-0.15 0.47 -2.75" align="center" color="#111827" width="3"></a-text>
  <a-text value="RESET" position="0.3 0.47 -2.75" align="center" color="#111827" width="3"></a-text>
  <a-text value="E-STOP" position="0.75 0.47 -2.75" align="center" color="#111827" width="3.5"></a-text>

  <!-- Status labels -->
  <a-text id="machineStatus" value="Machine: OFF" position="0 2.1 -3.4" align="center" color="#111827" width="6"></a-text>
  <a-text id="faultStatus" value="Fault: None" position="0 1.8 -3.4" align="center" color="#7c3aed" width="6"></a-text>
  <a-text id="scoreText" value="Score: 0" position="0 1.5 -3.4" align="center" color="#059669" width="5"></a-text>
  <a-text value="Premium Interactive Control Machine" position="0 0.18 -3.4" align="center" color="#2563eb" width="8"></a-text>

  <!-- Conveyor System -->
  <a-box position="-3.4 0.35 -3.6" width="2.9" height="0.22" depth="1.05" color="#64748b"></a-box>
  <a-cylinder position="-4.65 0.35 -3.6" radius="0.19" height="1.05" rotation="90 0 0" color="#334155"></a-cylinder>
  <a-cylinder position="-2.15 0.35 -3.6" radius="0.19" height="1.05" rotation="90 0 0" color="#334155"></a-cylinder>
  <a-box id="item1" position="-4.4 0.6 -3.35" width="0.24" height="0.24" depth="0.24" color="#f97316"></a-box>
  <a-box id="item2" position="-3.8 0.6 -3.6" width="0.24" height="0.24" depth="0.24" color="#22c55e"></a-box>
  <a-box id="item3" position="-3.2 0.6 -3.85" width="0.24" height="0.24" depth="0.24" color="#eab308"></a-box>
  <a-text value="Conveyor Demo" position="-3.4 1.18 -3.6" align="center" color="#111827" width="5"></a-text>

  <!-- Press Unit -->
  <a-box position="3.5 0.25 -3.6" width="1.6" height="0.52" depth="1.2" color="#94a3b8"></a-box>
  <a-cylinder position="3.5 2 -3.6" radius="0.14" height="1.75" color="#6b7280"></a-cylinder>
  <a-box id="pistonHead" position="3.5 1.2 -3.6" width="0.7" height="0.26" depth="0.7" color="#111827"></a-box>
  <a-text value="Press Unit" position="3.5 2.4 -3.6" align="center" color="#111827" width="5"></a-text>

  <!-- Emergency zone visual -->
  <a-ring position="0 0.03 -3.4" rotation="-90 0 0" radius-inner="1.8" radius-outer="1.95" color="#fecaca"></a-ring>

  <!-- Camera -->
  <a-entity id="rig" position="0 1.6 2.4">
    <a-camera wasd-controls="acceleration: 20" look-controls="pointerLockEnabled: false">
      <a-cursor color="#2563eb"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#dbeafe"></a-sky>
</a-scene>

<script>
  const rig = document.querySelector('#rig');

  document.querySelector('#stationElectrical').addEventListener('click', () => {
    rig.setAttribute('position', '-6 1.6 -3.9');
  });

  document.querySelector('#stationAI').addEventListener('click', () => {
    rig.setAttribute('position', '0 1.6 -3.7');
  });

  document.querySelector('#stationSafety').addEventListener('click', () => {
    rig.setAttribute('position', '6 1.6 -3.9');
  });

  let machineOn = false;
  let faultMode = false;
  let emergencyStopped = false;
  let score = 0;

  let fanInterval = null;
  let fanRotation = 0;

  let blinkInterval = null;
  let blinkState = false;

  let conveyorInterval = null;
  let pistonInterval = null;
  let pistonDirection = -1;
  let pistonY = 1.2;

  const machineBody = document.querySelector('#machineBody');
  const powerLight = document.querySelector('#powerLight');
  const warningLight = document.querySelector('#warningLight');
  const faultLight = document.querySelector('#faultLight');
  const fanBlades = document.querySelector('#fanBlades');

  const machineStatus = document.querySelector('#machineStatus');
  const faultStatus = document.querySelector('#faultStatus');
  const scoreText = document.querySelector('#scoreText');

  const startBtn = document.querySelector('#startBtn');
  const faultBtn = document.querySelector('#faultBtn');
  const resetBtn = document.querySelector('#resetBtn');
  const stopBtn = document.querySelector('#stopBtn');

  const item1 = document.querySelector('#item1');
  const item2 = document.querySelector('#item2');
  const item3 = document.querySelector('#item3');
  const pistonHead = document.querySelector('#pistonHead');

  let itemPositions = [
    { x: -4.4, z: -3.35, el: item1 },
    { x: -3.8, z: -3.6, el: item2 },
    { x: -3.2, z: -3.85, el: item3 }
  ];

  function updateScore(points) {
    score += points;
    scoreText.setAttribute('value', `Score: ${score}`);
  }

  function startFan() {
    if (fanInterval) return;
    fanInterval = setInterval(() => {
      fanRotation += faultMode ? 8 : 18;
      fanBlades.setAttribute('rotation', `0 0 ${fanRotation}`);
    }, 40);
  }

  function stopFan() {
    clearInterval(fanInterval);
    fanInterval = null;
  }

  function startBlinking() {
    if (blinkInterval) return;
    blinkInterval = setInterval(() => {
      blinkState = !blinkState;
      if (faultMode) {
        warningLight.setAttribute('color', blinkState ? '#ef4444' : '#7f1d1d');
      } else {
        warningLight.setAttribute('color', blinkState ? '#facc15' : '#7f1d1d');
      }
    }, faultMode ? 220 : 350);
  }

  function stopBlinking() {
    clearInterval(blinkInterval);
    blinkInterval = null;
    blinkState = false;
    warningLight.setAttribute('color', '#7f1d1d');
  }

  function startConveyor() {
    if (conveyorInterval) return;
    conveyorInterval = setInterval(() => {
      itemPositions.forEach(obj => {
        obj.x += faultMode ? 0.015 : 0.04;
        if (obj.x > -2.2) obj.x = -4.6;
        obj.el.setAttribute('position', `${obj.x} 0.6 ${obj.z}`);
      });
    }, 80);
  }

  function stopConveyor() {
    clearInterval(conveyorInterval);
    conveyorInterval = null;
  }

  function startPiston() {
    if (pistonInterval) return;
    pistonInterval = setInterval(() => {
      const step = faultMode ? 0.015 : 0.03;
      pistonY += pistonDirection * step;
      if (pistonY <= 0.82) pistonDirection = 1;
      if (pistonY >= 1.2) pistonDirection = -1;
      pistonHead.setAttribute('position', `3.5 ${pistonY} -3.6`);
    }, 60);
  }

  function stopPiston() {
    clearInterval(pistonInterval);
    pistonInterval = null;
    pistonY = 1.2;
    pistonDirection = -1;
    pistonHead.setAttribute('position', '3.5 1.2 -3.6');
  }

  function applyNormalMode() {
    machineBody.setAttribute('color', '#3b82f6');
    powerLight.setAttribute('color', '#22c55e');
    faultLight.setAttribute('color', '#4b5563');
    machineStatus.setAttribute('value', 'Machine: RUNNING');
    faultStatus.setAttribute('value', 'Fault: None');
  }

  function applyFaultMode() {
    machineBody.setAttribute('color', '#f59e0b');
    powerLight.setAttribute('color', '#22c55e');
    faultLight.setAttribute('color', '#ef4444');
    machineStatus.setAttribute('value', 'Machine: RUNNING (DEGRADED)');
    faultStatus.setAttribute('value', 'Fault: Conveyor Speed / Warning State');
  }

  function turnMachineOn() {
    if (emergencyStopped) return;

    machineOn = true;
    if (faultMode) {
      applyFaultMode();
    } else {
      applyNormalMode();
    }

    stopBlinking();
    startBlinking();
    startFan();
    startConveyor();
    startPiston();
  }

  function turnMachineOff() {
    machineOn = false;
    machineBody.setAttribute('color', '#2563eb');
    powerLight.setAttribute('color', '#ef4444');
    machineStatus.setAttribute('value', 'Machine: OFF');

    if (!faultMode) {
      faultStatus.setAttribute('value', 'Fault: None');
      faultLight.setAttribute('color', '#4b5563');
    }

    stopFan();
    stopBlinking();
    stopConveyor();
    stopPiston();
  }

  function emergencyStop() {
    emergencyStopped = true;
    machineOn = false;

    stopFan();
    stopBlinking();
    stopConveyor();
    stopPiston();

    powerLight.setAttribute('color', '#ef4444');
    warningLight.setAttribute('color', '#ef4444');
    faultLight.setAttribute('color', '#ef4444');
    machineBody.setAttribute('color', '#991b1b');

    machineStatus.setAttribute('value', 'Machine: EMERGENCY STOP');
    faultStatus.setAttribute('value', 'Fault: Emergency stop activated');

    updateScore(1);
  }

  function triggerFault() {
    faultMode = true;
    faultLight.setAttribute('color', '#ef4444');
    faultStatus.setAttribute('value', 'Fault: Simulated machine issue');

    if (machineOn) {
      applyFaultMode();
      stopBlinking();
      startBlinking();
    }

    updateScore(1);
  }

  function resetSystem() {
    emergencyStopped = false;
    faultMode = false;
    turnMachineOff();
    warningLight.setAttribute('color', '#7f1d1d');
    faultLight.setAttribute('color', '#4b5563');
    machineBody.setAttribute('color', '#2563eb');
    machineStatus.setAttribute('value', 'Machine: OFF');
    faultStatus.setAttribute('value', 'Fault: None');
    updateScore(1);
  }

  startBtn.addEventListener('click', () => {
    if (!machineOn && !emergencyStopped) {
      turnMachineOn();
      updateScore(1);
    }
  });

  faultBtn.addEventListener('click', () => {
    triggerFault();
  });

  resetBtn.addEventListener('click', () => {
    resetSystem();
  });

  stopBtn.addEventListener('click', () => {
    emergencyStop();
  });

  machineBody.addEventListener('click', () => {
    if (!machineOn && !emergencyStopped) {
      turnMachineOn();
      updateScore(1);
    } else if (machineOn) {
      turnMachineOff();
      updateScore(1);
    }
  });
</script>

</body>
</html>
