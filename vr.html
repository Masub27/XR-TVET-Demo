<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Workshop with Video - TVET</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; }

    .topbar {
      padding: 14px;
      text-align: center;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      font-weight: bold;
      color: #1f2937;
    }
  </style>
</head>

<body>

<div class="topbar">
  VR Workshop – Click station + Play training video
</div>

<a-scene embedded style="height: calc(100vh - 52px); width: 100%;">

  <!-- 🎥 VIDEO ASSET -->
  <a-assets>
    <video id="video1"
      src="https://raw.githubusercontent.com/Masub27/XR-TVET-Demo/main/Quick%20Avatar%20Video_1080p.mp4"
      preload="auto"
      crossorigin="anonymous"
      webkit-playsinline
      playsinline>
    </video>
  </a-assets>

  <!-- 💡 LIGHT -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 0.9" position="2 4 2"></a-entity>

  <!-- 🏠 ROOM -->
  <a-plane position="0 0 -4" rotation="-90 0 0" width="14" height="14" color="#e5e7eb"></a-plane>
  <a-plane position="0 2 -8" width="14" height="4" color="#eef2ff"></a-plane>
  <a-plane position="-7 2 -4" rotation="0 90 0" width="8" height="4" color="#f8fafc"></a-plane>
  <a-plane position="7 2 -4" rotation="0 -90 0" width="8" height="4" color="#f8fafc"></a-plane>
  <a-plane position="0 4 -4" rotation="90 0 0" width="14" height="14" color="#ffffff"></a-plane>

  <!-- ⚡ ELECTRICAL STATION -->
  <a-box id="stationElectrical" position="-4 1.2 -5.5" width="1.8" height="2.2" depth="0.15" color="#93c5fd"></a-box>
  <a-text value="Electrical Station" position="-4 2.7 -5.3" align="center" color="#111827" width="6"></a-text>

  <!-- 🤖 AI STATION -->
  <a-box id="stationAI" position="0 0.55 -5" width="2.2" height="0.15" depth="1.1" color="#8b5cf6"></a-box>
  <a-text value="AI Tutor Desk" position="0 2.2 -5" align="center" color="#111827" width="6"></a-text>

  <!-- 🦺 SAFETY STATION -->
  <a-cone id="stationSafety" position="4 0.6 -5.2" radius-bottom="0.45" radius-top="0.05" height="1.2" color="#f59e0b"></a-cone>
  <a-text value="Safety Corner" position="4 2.4 -5.1" align="center" color="#111827" width="6"></a-text>

  <!-- 🎥 VIDEO SCREEN -->
  <a-video 
    src="#video1"
    position="0 2 -6"
    width="4"
    height="2.2">
  </a-video>

  <!-- ▶ PLAY BUTTON -->
  <a-box id="playBtn"
    position="0 0.8 -5.5"
    width="1.5"
    height="0.4"
    depth="0.2"
    color="#2563eb">
  </a-box>

  <a-text 
    value="Play Video"
    position="0 0.8 -5.3"
    align="center"
    color="#ffffff"
    width="4">
  </a-text>

  <!-- 🎥 CAMERA -->
  <a-entity id="rig" position="0 1.6 2">
    <a-camera wasd-controls="acceleration: 20" look-controls="pointerLockEnabled: false">
      <a-cursor color="#2563eb"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#dbeafe"></a-sky>

</a-scene>

<script>
  const rig = document.querySelector('#rig');

  document.querySelector('#stationElectrical').addEventListener('click', () => {
    rig.setAttribute('position', '-4 1.6 -2.9');
  });

  document.querySelector('#stationAI').addEventListener('click', () => {
    rig.setAttribute('position', '0 1.6 -2.7');
  });

  document.querySelector('#stationSafety').addEventListener('click', () => {
    rig.setAttribute('position', '4 1.6 -2.9');
  });

  document.querySelector('#playBtn').addEventListener('click', () => {
    document.querySelector('#video1').play();
  });
</script>

</body>
</html>
